name: Robo de Shows v2

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  robo-shows:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar cache do Spotify
        run: echo '${{ secrets.SPOTIFY_CACHE }}' > .spotify_cache

      - name: Criar arquivo .env
        run: |
          echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}" >> .env
          echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
          echo "SPOTIFY_REDIRECT_URI=${{ secrets.SPOTIFY_REDIRECT_URI }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "BANDSINTOWN_APP_ID=${{ secrets.BANDSINTOWN_APP_ID }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Passo 1 - Buscar artistas do Spotify
        run: python passo1_spotify.py

      - name: Passo 2 - Buscar shows (Gemini grounding + ddgs)
        run: python passo2_buscar_shows.py

      - name: Passo 3 - Enviar notificacoes no Telegram
        run: python passo3_telegram.py
