name: Debug CSE

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnostico Google Custom Search
        run: |
          KEY=$(printf '%s' "${{ secrets.GOOGLE_API_KEY }}" | tr -d '[:space:]')
          CX=$(printf '%s'  "${{ secrets.GOOGLE_CSE_ID }}"  | tr -d '[:space:]')
          echo "== diagnostico de formato (nao revela valores) =="
          echo "API_KEY: bytes_originais=$(printf '%s' "${{ secrets.GOOGLE_API_KEY }}" | wc -c) | linhas=$(printf '%s' "${{ secrets.GOOGLE_API_KEY }}" | grep -c '' ) | bytes_limpos=${#KEY}"
          echo "CSE_ID : bytes_originais=$(printf '%s' "${{ secrets.GOOGLE_CSE_ID }}"  | wc -c) | linhas=$(printf '%s' "${{ secrets.GOOGLE_CSE_ID }}"  | grep -c '' ) | bytes_limpos=${#CX}"
          echo ""
          echo "== teste com as chaves LIMPAS (strip) =="
          code=$(curl -s -o resp.json -w "%{http_code}" "https://www.googleapis.com/customsearch/v1?key=$KEY&cx=$CX&q=thiago+espirito+santo+show+sp&num=3&gl=br&hl=pt-BR")
          echo "HTTP_STATUS=$code"
          echo "----- corpo -----"
          head -c 900 resp.json
          echo ""
          echo "----- links -----"
          python3 -c "import json; d=json.load(open('resp.json')); items=d.get('items',[]); print('\n'.join(i.get('link','') for i in items)) if items else print('(sem items)')" 2>/dev/null || echo "(parse falhou)"
